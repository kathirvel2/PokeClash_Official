<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéAbilities Database</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://assets.pokemon.com/static2/_ui/img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <a href="index.html" class="floating-back-button">&larr; Back</a>
    <div class="dex-logo-container">
         <img src="https://see.fontimg.com/api/rf5/15ze/N2RkMTc5ZWI4ZWM4NGM5YmFlZjJmMDkyMjVjZWJiZWMub3Rm/QWJpbGl0eSBEZXg/pocket-monk.png?r=fs&h=36&w=1000&fg=F5F556&bg=FFFFFF&tb=1&s=36" alt="Ability Dex">
    </div>

    <div class="search-container">
        <input type="text" id="abilitySearchInput" placeholder="Search for an ability...">
    </div>

    <div id="abilities-container" class="grid-container">
        <div class="loader"></div> 
    </div>

    <div id="abilityModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script src="abilities.js"></script>
</body>
</html>
